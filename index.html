<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Partida Contable</title>

  <style>
    body {
      font-family: "Segoe UI", Arial, sans-serif;
      background: #f4f6f9;
      margin: 0;
      padding: 20px;
    }

    .card {
      background: white;
      border-radius: 8px;
      padding: 20px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    h2 {
      margin-top: 0;
      color: #2c3e50;
      text-align: center;
      font-size: 22px;
      letter-spacing: 1px;
    }

    .row {
      display: flex;
      gap: 15px;
      margin-bottom: 15px;
    }

    .row label {
      font-weight: 600;
      font-size: 14px;
    }

    .row input {
      padding: 8px;
      border: 1px solid #ccc;
      border-radius: 4px;
      width: 100%;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 15px;
      table-layout: fixed;
    }

    th {
      background: #2c3e50;
      color: white;
      padding: 8px;
      font-size: 14px;
    }

    td {
      border: 1px solid #ddd;
      padding: 5px;
      vertical-align: top;
    }

    td input {
      width: 100%;
      border: none;
      padding: 6px;
      font-size: 13px;
      background: transparent;
      white-space: normal;
      word-break: break-word;
      overflow-wrap: anywhere;
    }

    td input:focus {
      outline: none;
      background: #f0f8ff;
    }

    td textarea{
      width:100%;
      border:none;
      padding:6px;
      font-size:13px;
      background:transparent;
      resize:none;
      overflow:hidden;
      line-height:1.2;
      white-space:pre-wrap;
      word-break:break-word;
      overflow-wrap:anywhere;
      font-family:inherit;
    }

    td textarea:focus{
      outline:none;
      background:#f0f8ff;
    }

    tfoot td {
      background: #f8fafc;
      font-weight: 700;
    }

    .actions {
      margin-top: 15px;
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    button {
      background: #2980b9;
      color: white;
      border: none;
      padding: 10px 16px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
    }

    button:hover {
      background: #1f6391;
    }

    .ok { color: green; }
    .error { color: red; }

    .taxbox{
      display:flex;
      gap:12px;
      align-items:center;
      flex-wrap:wrap;
      padding:6px 10px;
      border:1px solid #e5e7eb;
      border-radius:6px;
      background:#fbfdff;
    }

    .taxbox label{
      display:flex;
      align-items:center;
      gap:8px;
      font-size:14px;
      font-weight:600;
      user-select:none;
      cursor:pointer;
    }
  </style>
</head>

<body>
  <div class="card">
    <h2>PARTIDA CONTABLE</h2>

    <!-- ✅ ENCABEZADO (como tu original) -->
    <div class="row">
      <div style="flex:1">
        <label>Fecha</label>
        <input type="date" id="fecha">
      </div>

      <div style="flex:2">
        <label>PARTIDA N°</label>
        <input type="text" id="numPartida" placeholder="Ej: 001-2026">
      </div>

      <div style="flex:3">
        <label>Descripción</label>
        <input type="text" id="concepto" placeholder="Descripción general de la partida">
      </div>
    </div>

    <table>
      <thead>
        <tr>
          <th style="width:15%">Cuenta</th>
          <th style="width:45%">Descripción</th>
          <th style="width:20%">Debe (L)</th>
          <th style="width:20%">Haber (L)</th>
        </tr>
      </thead>

      <tbody id="detalle"></tbody>

      <!-- ✅ Totales al final de la tabla -->
      <tfoot>
        <tr>
          <td></td>
          <td style="text-align:right;">TOTALES</td>
          <td id="tdTotalDebe" style="text-align:right;"></td>
          <td id="tdTotalHaber" style="text-align:right;"></td>
        </tr>
        <tr>
          <td colspan="4" id="tdEstado" style="text-align:right;"></td>
        </tr>
      </tfoot>
    </table>

    <div class="actions">
      <button id="btnAgregar">➕ Agregar Cuenta</button>
      <button id="btnBold">𝐁 Negrita</button>
      <button id="btnUnderline">U̲ Subrayado</button>
      <button id="btnPDF">📄 Exportar PDF</button>
      <button id="btnLimpiar">🧹 Limpiar</button>

      <!-- ✅ 3 checkbox (solo 1 activo a la vez) -->
      <div class="taxbox" title="Selecciona un tipo de impuesto">
        <label><input type="checkbox" id="tax15"> ISV 15%</label>
        <label><input type="checkbox" id="tax18"> ISR 12.5%</label>
        <label><input type="checkbox" id="taxExento"> 3- Exento</label>
      </div>
    </div>
  </div>

  <!-- jsPDF -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>

  <script>
    window.addEventListener("DOMContentLoaded", () => {
      const detalle = document.getElementById("detalle");

      const tdTotalDebe = document.getElementById("tdTotalDebe");
      const tdTotalHaber = document.getElementById("tdTotalHaber");
      const tdEstado = document.getElementById("tdEstado");

      const btnAgregar = document.getElementById("btnAgregar");
      const btnPDF = document.getElementById("btnPDF");
      const btnBold = document.getElementById("btnBold");
      const btnUnderline = document.getElementById("btnUnderline");
      const btnLimpiar = document.getElementById("btnLimpiar");

      const numPartida = document.getElementById("numPartida");
      const fecha = document.getElementById("fecha");
      const concepto = document.getElementById("concepto");

      const tax15 = document.getElementById("tax15");
      const tax18 = document.getElementById("tax18");
      const taxExento = document.getElementById("taxExento");

      const formatoMoneda = new Intl.NumberFormat('es-HN', {
        style: 'currency',
        currency: 'HNL',
        minimumFractionDigits: 2
      });

      let inputActivo = null;

      const CUENTA_IMP = "-27110";
      const DESC_IMP = "IMPUESTO S/V";
      const DESC_IMP_SR = "IMPUESTO S/R"; // ✅ (ÚNICO CAMBIO) texto para ISR 12.5%
      const LOGO_URL = "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSCikYCv00njXxHYpb5t_PfM8XJHzBsEtlAVQ&s";

      function autoGrowTextarea(ta){
        ta.style.height = "auto";
        ta.style.height = (ta.scrollHeight) + "px";
      }

      function attachEvents(tr){
        tr.querySelectorAll("input, textarea").forEach(inp => {
          inp.addEventListener("input", () => {
            if (inp.tagName === "TEXTAREA") autoGrowTextarea(inp);
            calcular();
          });
          inp.addEventListener("focus", () => inputActivo = inp);
        });
      }

      function agregarFila() {
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td><input placeholder="Cuenta"></td>
          <td><textarea rows="1" placeholder="Descripción"></textarea></td>
          <td><input type="number" step="0.01" placeholder="0.00"></td>
          <td><input type="number" step="0.01" placeholder="0.00"></td>
        `;
        attachEvents(tr);
        detalle.appendChild(tr);

        autoGrowTextarea(tr.cells[1].querySelector("textarea"));
        calcular();
      }

      function setSoloUno(chk){
        [tax15, tax18, taxExento].forEach(x => { if (x !== chk) x.checked = false; });
      }

      function getTasa(){
        if (tax15.checked) return 0.15;
        if (tax18.checked) return 0.125;
        if (taxExento.checked) return 0;
        return null;
      }

      function findImpuestoRow(){
        return [...detalle.rows].find(r => {
          const c = r.cells[0].querySelector("input");
          return (c.value || "").trim() === CUENTA_IMP;
        }) || null;
      }

      function removeImpuestoRow(){
        const r = findImpuestoRow();
        if (r) r.remove();
      }

      function ensureImpuestoRow(){
        let r = findImpuestoRow();
        if (!r){
          r = document.createElement("tr");
          r.innerHTML = `
            <td><input></td>
            <td><textarea rows="1"></textarea></td>
            <td><input type="number" step="0.01"></td>
            <td><input type="number" step="0.01"></td>
          `;
          attachEvents(r);
          detalle.appendChild(r);
        }

        const inCuenta = r.cells[0].querySelector("input");
        const inDesc   = r.cells[1].querySelector("textarea");
        const inDebe   = r.cells[2].querySelector("input");
        const inHaber  = r.cells[3].querySelector("input");

        inCuenta.value = CUENTA_IMP;
        inCuenta.readOnly = true;

        inDesc.value = DESC_IMP;  // (se mantiene, luego lo personalizamos según checkbox)
        inDesc.readOnly = true;

        inDebe.value = "";
        inDebe.readOnly = true;

        // Haber calculado automático
        inHaber.readOnly = true;

        // estilos pedidos
        inDesc.style.fontWeight = "bold";
        inDesc.style.textDecoration = "underline";
        inDesc.style.textAlign = "center";

        inCuenta.style.textAlign = "center";
        inCuenta.style.fontWeight = "bold";
        inDebe.style.textAlign = "right";
        inHaber.style.textAlign = "right";

        autoGrowTextarea(inDesc);
        return r;
      }

      // ✅ BASE: PRIMERA FILA, COLUMNA DEBE (valor exacto, no suma)
      function getBasePrimeraFilaDebe(){
        const row1 = detalle.rows[0]; // 1ra fila (índice 0)
        if (!row1) return 0;
        const inpDebe = row1.cells[2].querySelector('input[type="number"]');
        return parseFloat(inpDebe?.value) || 0;
      }

      function calcularImpuesto(){
        const tasa = getTasa();

        // ninguno seleccionado o exento => no fila
        if (tasa === null || tasa === 0){
          removeImpuestoRow();
          return;
        }

        const base = getBasePrimeraFilaDebe(); // ✅ SOLO DEBE FILA 1
        const impuesto = base * tasa;

        const rImp = ensureImpuestoRow();

        // ✅ (ÚNICO CAMBIO) Personalizar el mensaje según el checkbox
        const inDesc = rImp.cells[1].querySelector("textarea");
        if (tax15.checked) inDesc.value = DESC_IMP;       // IMPUESTO S/V
        else if (tax18.checked) inDesc.value = DESC_IMP_SR; // IMPUESTO S/R

        rImp.cells[3].querySelector('input[type="number"]').value =
          (Math.round(impuesto * 100) / 100).toFixed(2);

        autoGrowTextarea(inDesc);
      }

      function calcular() {
        // 1) impuesto
        calcularImpuesto();

        // 2) totales
        let totalDebe = 0;
        let totalHaber = 0;

        [...detalle.rows].forEach(row => {
          totalDebe += parseFloat(row.cells[2].querySelector("input").value) || 0;
          totalHaber += parseFloat(row.cells[3].querySelector("input").value) || 0;
        });

        tdTotalDebe.textContent = formatoMoneda.format(totalDebe);
        tdTotalHaber.textContent = formatoMoneda.format(totalHaber);

        const balanceada = (totalDebe === totalHaber && totalDebe > 0);
        tdEstado.innerHTML = balanceada
          ? `Estado: <span class="ok">✔ BALANCEADA</span>`
          : `Estado: <span class="error">✘ DESCUADRADA</span>`;
      }

      btnAgregar.addEventListener("click", agregarFila);

      btnBold.addEventListener("click", () => {
        if (!inputActivo) return;
        inputActivo.style.fontWeight = inputActivo.style.fontWeight === "bold" ? "normal" : "bold";
      });

      btnUnderline.addEventListener("click", () => {
        if (!inputActivo) return;
        inputActivo.style.textDecoration = inputActivo.style.textDecoration === "underline" ? "none" : "underline";
      });

      btnLimpiar.addEventListener("click", () => {
        detalle.innerHTML = "";
        agregarFila(); agregarFila(); agregarFila();
        tax15.checked = tax18.checked = taxExento.checked = false;
        calcular();
      });

      [tax15, tax18, taxExento].forEach(chk => {
        chk.addEventListener("change", () => {
          if (chk.checked) setSoloUno(chk);
          calcular();
        });
      });

      // PDF (con logo + encabezado + firmas + subrayado)
      btnPDF.addEventListener("click", () => {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF('p', 'mm', 'a4');
        const pageWidth = doc.internal.pageSize.width;

        // asegurar que el impuesto esté actualizado antes de imprimir
        calcular();

        // totales reales
        let totalDebe = 0, totalHaber = 0;
        [...detalle.rows].forEach(row => {
          totalDebe += parseFloat(row.cells[2].querySelector("input").value) || 0;
          totalHaber += parseFloat(row.cells[3].querySelector("input").value) || 0;
        });
        const balanceada = (totalDebe === totalHaber && totalDebe > 0);
        const estadoTxt = balanceada ? "BALANCEADA" : "DESCUADRADA";

        const img = new Image();
        img.crossOrigin = "anonymous";
        img.src = LOGO_URL;

        img.onload = function () {
          // Logo
          const logoWidth = 30;
          const logoHeight = (img.height / img.width) * logoWidth;
          doc.addImage(img, 'PNG', 14, 10, logoWidth, logoHeight);

          // Título
          doc.setFontSize(18);
          doc.setFont(undefined, 'bold');
          doc.text("PARTIDA CONTABLE", pageWidth / 2, 20, { align: "center" });

          // Encabezado info
          doc.setFontSize(12);
          doc.setFont(undefined, 'normal');
          doc.text(`PDA N°: ${numPartida.value || "________"}`, 45, 28);
          doc.text(`Fecha: ${fecha.value || "________"}`, 45, 34);
          doc.text(`Descripción: ${concepto.value || ""}`, 45, 40);

          const headers = [["Cuenta", "Descripción", "Debe (L)", "Haber (L)"]];

          const bodyData = [...detalle.rows].map(row => {
            const cuenta = row.cells[0].querySelector("input");
            const desc = row.cells[1].querySelector("textarea");
            const debe = row.cells[2].querySelector("input");
            const haber = row.cells[3].querySelector("input");

            const inputs = [cuenta, desc, debe, haber];

            return inputs.map(inp => {
              const isNum = inp.type === "number";
              const rawVal = inp.value || (isNum ? 0 : "");
              const value = isNum ? formatoMoneda.format(rawVal || 0) : rawVal;

              const bold = inp.style.fontWeight === "bold";
              const underline = inp.style.textDecoration === "underline";
              const align = inp.style.textAlign || (isNum ? "right" : "left");

              return {
                content: value,
                styles: { fontStyle: bold ? "bold" : "normal", halign: align },
                _underline: underline
              };
            });
          });

          const foot = [
            ["", "TOTALES", formatoMoneda.format(totalDebe), formatoMoneda.format(totalHaber)],
            [{ content: `Estado: ${estadoTxt}`, colSpan: 4, styles: { fontStyle: "bold", halign: "right" } }]
          ];

          doc.autoTable({
            head: headers,
            body: bodyData,
            foot: foot,
            startY: 46,
            theme: "grid",
            headStyles: { fillColor: [44, 62, 80], textColor: 255, fontStyle: "bold" },
            footStyles: { fillColor: [248, 250, 252], textColor: 20, fontStyle: "bold" },
            styles: { fontSize: 11, cellWidth: "wrap" },

            // Subrayado manual (porque AutoTable no lo soporta directo)
            didDrawCell: function (hookData) {
              if (hookData.section !== "body") return;
              const raw = hookData.cell && hookData.cell.raw;
              if (!raw || !raw._underline) return;

              const cell = hookData.cell;
              const padLeft = typeof cell.padding === "function" ? cell.padding("left") : 2;
              const padRight = typeof cell.padding === "function" ? cell.padding("right") : 2;

              const x1 = cell.x + padLeft;
              const x2 = cell.x + cell.width - padRight;
              const y = cell.y + cell.height - 2;

              hookData.doc.line(x1, y, x2, y);
            },

            // ✅ Firmas (como tu original)
            didDrawPage: function () {
              const pageHeight = doc.internal.pageSize.height;
              const y = pageHeight - 25;
              doc.setFontSize(12);
              doc.text("__________________________", 20, y);
              doc.text("__________________________", 120, y);
              doc.text("Firma Administrador", 25, y + 6);
              doc.text("Firma Contabilidad", 125, y + 6);
            }
          });

          doc.save("Partida_Contable_ENAG.pdf");
        };

        // Si el logo falla por CORS, igual generamos PDF sin logo (pero sin romper)
        img.onerror = function(){
          doc.setFontSize(18);
          doc.setFont(undefined, 'bold');
          doc.text("PARTIDA CONTABLE", pageWidth / 2, 20, { align: "center" });

          doc.setFontSize(12);
          doc.setFont(undefined, 'normal');
          doc.text(`PDA N°: ${numPartida.value || "________"}`, 14, 30);
          doc.text(`Fecha: ${fecha.value || "________"}`, 14, 36);
          doc.text(`Descripción: ${concepto.value || ""}`, 14, 42);

          const headers = [["Cuenta", "Descripción", "Debe (L)", "Haber (L)"]];

          const bodyData = [...detalle.rows].map(row => {
            const cuenta = row.cells[0].querySelector("input");
            const desc = row.cells[1].querySelector("textarea");
            const debe = row.cells[2].querySelector("input");
            const haber = row.cells[3].querySelector("input");
            const inputs = [cuenta, desc, debe, haber];

            return inputs.map(inp => {
              const isNum = inp.type === "number";
              const rawVal = inp.value || (isNum ? 0 : "");
              const value = isNum ? formatoMoneda.format(rawVal || 0) : rawVal;

              const bold = inp.style.fontWeight === "bold";
              const underline = inp.style.textDecoration === "underline";
              const align = inp.style.textAlign || (isNum ? "right" : "left");

              return { content: value, styles: { fontStyle: bold ? "bold" : "normal", halign: align }, _underline: underline };
            });
          });

          let totalDebe = 0, totalHaber = 0;
          [...detalle.rows].forEach(row => {
            totalDebe += parseFloat(row.cells[2].querySelector("input").value) || 0;
            totalHaber += parseFloat(row.cells[3].querySelector("input").value) || 0;
          });
          const balanceada = (totalDebe === totalHaber && totalDebe > 0);
          const estadoTxt = balanceada ? "BALANCEADA" : "DESCUADRADA";

          const foot = [
            ["", "TOTALES", formatoMoneda.format(totalDebe), formatoMoneda.format(totalHaber)],
            [{ content: `Estado: ${estadoTxt}`, colSpan: 4, styles: { fontStyle: "bold", halign: "right" } }]
          ];

          doc.autoTable({
            head: headers,
            body: bodyData,
            foot: foot,
            startY: 50,
            theme: "grid",
            headStyles: { fillColor: [44, 62, 80], textColor: 255, fontStyle: "bold" },
            footStyles: { fillColor: [248, 250, 252], textColor: 20, fontStyle: "bold" },
            styles: { fontSize: 11, cellWidth: "wrap" },
            didDrawCell: function (hookData) {
              if (hookData.section !== "body") return;
              const raw = hookData.cell && hookData.cell.raw;
              if (!raw || !raw._underline) return;
              const cell = hookData.cell;
              const x1 = cell.x + 2;
              const x2 = cell.x + cell.width - 2;
              const y = cell.y + cell.height - 2;
              hookData.doc.line(x1, y, x2, y);
            },
            didDrawPage: function () {
              const pageHeight = doc.internal.pageSize.height;
              const y = pageHeight - 25;
              doc.setFontSize(12);
              doc.text("__________________________", 20, y);
              doc.text("__________________________", 120, y);
              doc.text("Firma Administrador", 25, y + 6);
              doc.text("Firma Contabilidad", 125, y + 6);
            }
          });

          doc.save("Partida_Contable_ENAG.pdf");
        };
      });

      // Filas iniciales
      agregarFila();
      agregarFila();
      agregarFila();
      calcular();
    });
  </script>
</body>
</html>
