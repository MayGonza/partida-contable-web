<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Partida Contable - ENAG</title>

  <style>
    body {
      font-family: "Segoe UI", Arial, sans-serif;
      background: #f4f6f9;
      margin: 0;
      padding: 20px;
    }

    .card {
      max-width: 900px;
      margin: 0 auto;
      background: white;
      border-radius: 8px;
      padding: 20px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    h2 {
      margin-top: 0;
      color: #2c3e50;
      text-align: center;
      font-size: 22px;
      letter-spacing: 1px;
    }

    .row {
      display: flex;
      gap: 15px;
      margin-bottom: 15px;
    }

    .row label {
      font-weight: 600;
      font-size: 14px;
      display: block;
      margin-bottom: 5px;
    }

    .row input {
      padding: 8px;
      border: 1px solid #ccc;
      border-radius: 4px;
      width: 100%;
      box-sizing: border-box;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 15px;
      table-layout: fixed;
    }

    th {
      background: #2c3e50;
      color: white;
      padding: 8px;
      font-size: 14px;
    }

    td {
      border: 1px solid #ddd;
      padding: 5px;
      vertical-align: top;
    }

    td input, td textarea {
      width: 100%;
      border: none;
      padding: 6px;
      font-size: 13px;
      background: transparent;
      box-sizing: border-box;
      font-family: inherit;
    }

    td input:focus, td textarea:focus {
      outline: none;
      background: #f0f8ff;
    }

    td textarea {
      resize: none;
      overflow: hidden;
      display: block;
    }

    tfoot td {
      background: #f8fafc;
      font-weight: 700;
    }

    .actions {
      margin-top: 15px;
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    button {
      background: #2980b9;
      color: white;
      border: none;
      padding: 10px 16px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
    }

    button:hover {
      background: #1f6391;
    }

    .ok { color: green; }
    .error { color: red; }

    .taxbox {
      display: flex;
      gap: 12px;
      align-items: center;
      padding: 6px 10px;
      border: 1px solid #e5e7eb;
      border-radius: 6px;
      background: #fbfdff;
    }
  </style>
</head>

<body>
  <div class="card">
    <h2>PARTIDA CONTABLE</h2>

    <div class="row">
      <div style="flex:1">
        <label>Fecha</label>
        <input type="date" id="fecha">
      </div>
      <div style="flex:2">
        <label>PARTIDA N°</label>
        <input type="text" id="numPartida" placeholder="Ej: 001-2026">
      </div>
      <div style="flex:3">
        <label>Descripción General</label>
        <input type="text" id="concepto" placeholder="Glosa de la partida">
      </div>
    </div>

    <table>
      <thead>
        <tr>
          <th style="width:15%">Cuenta</th>
          <th style="width:45%">Descripción</th>
          <th style="width:20%">Debe (L)</th>
          <th style="width:20%">Haber (L)</th>
        </tr>
      </thead>
      <tbody id="detalle"></tbody>
      <tfoot>
        <tr>
          <td></td>
          <td style="text-align:right;">TOTALES</td>
          <td id="tdTotalDebe" style="text-align:right;"></td>
          <td id="tdTotalHaber" style="text-align:right;"></td>
        </tr>
        <tr>
          <td colspan="4" id="tdEstado" style="text-align:right;"></td>
        </tr>
      </tfoot>
    </table>

    <div class="actions">
      <button id="btnAgregar">➕ Agregar Cuenta</button>
      <button id="btnBold">𝐁 Negrita</button>
      <button id="btnUnderline">U̲ Subrayado</button>
      <button id="btnPDF">📄 Exportar PDF</button>
      <button id="btnLimpiar">🧹 Limpiar</button>

      <div class="taxbox">
        <label><input type="checkbox" id="tax15"> ISV 15%</label>
        <label><input type="checkbox" id="tax18"> ISR 12.5%</label>
        <label><input type="checkbox" id="taxExento"> Exento</label>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>

  <script>
    window.addEventListener("DOMContentLoaded", () => {
      const detalle = document.getElementById("detalle");
      const tdTotalDebe = document.getElementById("tdTotalDebe");
      const tdTotalHaber = document.getElementById("tdTotalHaber");
      const tdEstado = document.getElementById("tdEstado");

      const btnAgregar = document.getElementById("btnAgregar");
      const btnPDF = document.getElementById("btnPDF");
      const btnBold = document.getElementById("btnBold");
      const btnUnderline = document.getElementById("btnUnderline");
      const btnLimpiar = document.getElementById("btnLimpiar");

      const tax15 = document.getElementById("tax15");
      const tax18 = document.getElementById("tax18");
      const taxExento = document.getElementById("taxExento");

      const formatoMoneda = new Intl.NumberFormat('es-HN', {
        style: 'currency',
        currency: 'HNL',
        minimumFractionDigits: 2
      });

      let inputActivo = null;

      // CONFIGURACIÓN DE LOGO E IMPUESTOS
      const CUENTA_IMP = "-27110";
      const DESC_IMP = "IMPUESTO S/V";
      const DESC_IMP_SR = "IMPUESTO S/R";
      const LOGO_URL = "logo.png"; 

      function autoGrowTextarea(ta) {
        ta.style.height = "auto";
        ta.style.height = (ta.scrollHeight) + "px";
      }

      function attachEvents(tr) {
        tr.querySelectorAll("input, textarea").forEach(inp => {
          inp.addEventListener("input", () => {
            if (inp.tagName === "TEXTAREA") autoGrowTextarea(inp);
            calcular();
          });
          inp.addEventListener("focus", () => inputActivo = inp);
        });
      }

      function agregarFila() {
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td><input placeholder="Cuenta"></td>
          <td><textarea rows="1" placeholder="Descripción"></textarea></td>
          <td><input type="number" step="0.01" placeholder="0.00"></td>
          <td><input type="number" step="0.01" placeholder="0.00"></td>
        `;
        attachEvents(tr);
        detalle.appendChild(tr);
        autoGrowTextarea(tr.cells[1].querySelector("textarea"));
        calcular();
      }

      function calcular() {
        // Lógica de impuestos
        const tasa = tax15.checked ? 0.15 : (tax18.checked ? 0.125 : 0);
        const row1 = detalle.rows[0];
        const baseDebe = row1 ? parseFloat(row1.cells[2].querySelector("input").value) || 0 : 0;
        
        let rImp = [...detalle.rows].find(r => r.cells[0].querySelector("input").value === CUENTA_IMP);
        
        if (tasa > 0 && baseDebe > 0) {
          if (!rImp) {
            rImp = document.createElement("tr");
            rImp.innerHTML = `<td><input readonly></td><td><textarea readonly rows="1"></textarea></td><td><input readonly></td><td><input readonly></td>`;
            attachEvents(rImp);
            detalle.appendChild(rImp);
          }
          rImp.cells[0].querySelector("input").value = CUENTA_IMP;
          rImp.cells[1].querySelector("textarea").value = tax15.checked ? DESC_IMP : DESC_IMP_SR;
          rImp.cells[3].querySelector("input").value = (baseDebe * tasa).toFixed(2);
          
          // Estilo automático para la fila de impuesto
          const txtImp = rImp.cells[1].querySelector("textarea");
          txtImp.style.fontWeight = "bold";
          txtImp.style.textDecoration = "underline";
          txtImp.style.textAlign = "center";
          autoGrowTextarea(txtImp);
        } else if (rImp) {
          rImp.remove();
        }

        // Cálculo de totales
        let totalDebe = 0, totalHaber = 0;
        [...detalle.rows].forEach(row => {
          totalDebe += parseFloat(row.cells[2].querySelector("input").value) || 0;
          totalHaber += parseFloat(row.cells[3].querySelector("input").value) || 0;
        });

        tdTotalDebe.textContent = formatoMoneda.format(totalDebe);
        tdTotalHaber.textContent = formatoMoneda.format(totalHaber);
        const bal = (totalDebe.toFixed(2) === totalHaber.toFixed(2) && totalDebe > 0);
        tdEstado.innerHTML = bal ? `<span class="ok">✔ BALANCEADA</span>` : `<span class="error">✘ DESCUADRADA</span>`;
      }

      // Manejo de Checkboxes (Solo uno activo)
      [tax15, tax18, taxExento].forEach(chk => {
        chk.addEventListener("change", () => {
          if (chk.checked) [tax15, tax18, taxExento].forEach(x => { if (x !== chk) x.checked = false; });
          calcular();
        });
      });

      btnBold.addEventListener("click", () => { if(inputActivo) inputActivo.style.fontWeight = inputActivo.style.fontWeight === "bold" ? "normal" : "bold"; });
      btnUnderline.addEventListener("click", () => { if(inputActivo) inputActivo.style.textDecoration = inputActivo.style.textDecoration === "underline" ? "none" : "underline"; });
      btnAgregar.addEventListener("click", agregarFila);
      btnLimpiar.addEventListener("click", () => { location.reload(); });

      // EXPORTACIÓN PDF
      btnPDF.addEventListener("click", () => {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF('p', 'mm', 'a4');
        const pageWidth = doc.internal.pageSize.width;
        
        const img = new Image();
        img.src = LOGO_URL;
        img.onload = function() {
          // 1. Logo Centrado
          const logoWidth = 800;
          const logoHeight = (img.height / img.width) * logoWidth;
          const xCentro = (pageWidth - logoWidth) / 2;
          doc.addImage(img, 'PNG', xCentro, 10, logoWidth, logoHeight);

          // 2. Título dinámico según tamaño del logo
          const yTitulo = 10 + logoHeight + 10;
          doc.setFontSize(18);
          doc.setFont(undefined, 'bold');
          doc.text("PARTIDA CONTABLE", pageWidth / 2, yTitulo, { align: "center" });

          // 3. Encabezado de información
          const yInfo = yTitulo + 12;
          doc.setFontSize(11);
          doc.setFont(undefined, 'normal');
          doc.text(`PDA N°: ${document.getElementById("numPartida").value || "________"}`, 14, yInfo);
          doc.text(`Fecha: ${document.getElementById("fecha").value || "________"}`, 14, yInfo + 7);
          doc.text(`Descripción: ${document.getElementById("concepto").value || ""}`, 14, yInfo + 14);

          // 4. Tabla
          const bodyData = [...detalle.rows].map(row => {
            return [...row.cells].map(td => {
              const el = td.querySelector("input, textarea");
              return {
                content: el.type === "number" ? formatoMoneda.format(el.value || 0) : el.value,
                styles: { 
                  fontStyle: el.style.fontWeight === "bold" ? "bold" : "normal",
                  halign: el.style.textAlign || (el.type === "number" ? "right" : "left")
                },
                _underline: el.style.textDecoration === "underline"
              };
            });
          });

          doc.autoTable({
            startY: yInfo + 22,
            head: [["Cuenta", "Descripción", "Debe (L)", "Haber (L)"]],
            body: bodyData,
            theme: 'grid',
            headStyles: { fillColor: [44, 62, 80] },
            didDrawCell: (data) => {
              if (data.section === 'body' && data.cell.raw._underline) {
                doc.line(data.cell.x + 2, data.cell.y + data.cell.height - 2, data.cell.x + data.cell.width - 2, data.cell.y + data.cell.height - 2);
              }
            }
          });

          // Firmas al final
          const finalY = doc.lastAutoTable.finalY + 30;
          doc.text("__________________________", 20, finalY);
          doc.text("__________________________", 120, finalY);
          doc.text("Firma Administrador", 30, finalY + 7);
          doc.text("Firma Contabilidad", 130, finalY + 7);

          doc.save("Partida_Contable.pdf");
        };
        img.onerror = () => alert("Error: No se encontró el archivo logo.png en la carpeta.");
      });

      // Filas por defecto
      for(let i=0; i<3; i++) agregarFila();
    });
  </script>
</body>
</html>
